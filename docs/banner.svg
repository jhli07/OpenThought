<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" rx="10" fill="url(#bg)"/>
  
  <!-- Accent line -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent)"/>
  
  <!-- Logo circle -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#667eea" stroke-width="3"/>
  <text x="100" y="95" text-anchor="middle" font-size="28" fill="#667eea" font-family="Arial">🧠</text>
  <text x="100" y="115" text-anchor="middle" font-size="10" fill="#888" font-family="Arial">THINK</text>
  
  <!-- Title -->
  <text x="180" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">OpenThought</text>
  
  <!-- Subtitle -->
  <text x="180" y="105" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0">AI-Powered Chain-of-Thought Tool</text>
  
  <!-- Tagline -->
  <text x="180" y="135" font-family="Arial, sans-serif" font-size="14" fill="#667eea">用苏格拉底式追问法，帮助你深度思考</text>
  
  <!-- Version badge -->
  <rect x="180" y="150" width="70" height="24" rx="12" fill="url(#accent)"/>
  <text x="215" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">v2.1.0</text>
  
  <!-- Stars -->
  <text x="650" y="60" font-family="Arial, sans-serif" font-size="14" fill="#ffd700">★</text>
  <text x="670" y="60" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Star</text>
  
  <!-- Language -->
  <text x="720" y="60" font-family="Arial, sans-serif" font-size="14" fill="#4ade80">Python</text>
  
  <!-- License -->
  <text x="650" y="90" font-family="Arial, sans-serif" font-size="12" fill="#888">MIT License</text>
  
  <!-- Features -->
  <text x="650" y="125" font-family="Arial, sans-serif" font-size="11" fill="#888">✓ AI 智能追问</text>
  <text x="650" y="145" font-family="Arial, sans-serif" font-size="11" fill="#888">✓ 10+ LLM 提供商</text>
  <text x="720" y="125" font-family="Arial, sans-serif" font-size="11" fill="#888">✓ CLI + Web 界面</text>
  <text x="720" y="145" font-family="Arial, sans-serif" font-size="11" fill="#888">✓ 完全开源</text>
  
  <!-- URL -->
  <text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#667eea">https://github.com/jhli07/OpenThought</text>
</svg>